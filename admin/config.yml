backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    files:
      - name: "products"
        label: "Products"
        file: "products.json"
        fields:
          - name: "products"
            label: "Products"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Price (number only)", name: "price", widget: "number", value_type: "float"}
              - {label: "Description", name: "description", widget: "text", required: false}
              - {label: "Image", name: "image", widget: "image", required: false}
              - {label: "Video (optional)", name: "video", widget: "file", required: false}
              - {label: "Badge", name: "badge", widget: "string", required: false}
              - {label: "Category", name: "category", widget: "select", options: ["Gym Gear", "Home Decor", "Tech Gadgets", "Custom Orders", "Engineering Parts", "Prototypes"]}
              - {label: "Material", name: "material", widget: "string", required: false, default: "PLA"}
              - {label: "Colors (one per line)", name: "colors", widget: "list", required: false, hint: "Enter color names or hex codes (e.g., #FF0000 or Red)"}
