backend:
  name: git-gateway
  branch: main

media_folder: "images"
public_folder: "/images"

collections:
  - name: "products"
    label: "Products"
    files:
      - name: "products"
        label: "Products"
        file: "products.json"
        fields:
          - name: "products"
            label: "Products"
            widget: "list"
            fields:
              - {label: "Title", name: "title", widget: "string"}
              - {label: "Price (IQD)", name: "price", widget: "number", value_type: "float"}
              - {label: "Description", name: "description", widget: "text", required: false}
              - {label: "Image", name: "image", widget: "image", required: false}
              - {label: "Video (MP4)", name: "video", widget: "file", required: false, hint: "Upload a short video of the product (optional)"}
              - {label: "Badge", name: "badge", widget: "string", required: false}
              - {label: "Category", name: "category", widget: "select", options: ["Gym Gear", "Home Decor", "Tech Gadgets", "Custom Orders", "Engineering Parts", "Prototypes"]}
              - {label: "Material", name: "material", widget: "string", required: false, default: "PLA"}
              - {label: "Colors", name: "colors", widget: "list", required: false, hint: "Enter color codes or names, one per line (e.g., #FF0000 or Red)"}
